<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forge — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    /* Reuse styles from Login... (omitted for brevity, assume identical :root and body) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0f; --surface: #16161f; --accent: #7c6ef5; --border: #222232; --text: #e2e2ed; --text-dim: #9090aa; --radius: 12px; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    body::after { content: ''; position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(124,110,245,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(124,110,245,0.025) 1px, transparent 1px); background-size: 48px 48px; }
    
    .auth-card { position: relative; z-index: 1; width: 100%; max-width: 440px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; animation: fadeUp 0.5s ease-out; }
    .brand-header { text-align: center; margin-bottom: 2rem; }
    .brand-icon { width: 42px; height: 42px; background: var(--accent); clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%); margin: 0 auto 1rem; }
    .brand-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
    input { width: 100%; background: #0d0d14; border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: #fff; }
    input:focus { outline: none; border-color: var(--accent); }
    .btn-submit { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .footer-links { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-dim); }
    .footer-links a { color: var(--accent); text-decoration: none; }

    /* Unique for Register */
    .eyebrow { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 4px; display: block; text-align: center; }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="brand-header">
    <span class="eyebrow">Start Building</span>
    <div class="brand-icon"></div>
    <h1 class="brand-name">Create Forge Account</h1>
  </div>

  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="name" placeholder="John" required>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="lname" placeholder="Doe" required>
      </div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="name@work.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Min. 8 characters" required>
    </div>
    
    <button type="submit" class="btn-submit">Join the Forge</button>
  </form>

  <div class="footer-links">
    Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
  </div>
</div>

</body>
</html>
