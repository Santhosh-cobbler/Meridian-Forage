<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forge — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #16161f;
      --accent: #7c6ef5;
      --border: #222232;
      --text: #e2e2ed;
      --text-dim: #9090aa;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Grid Texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(124,110,245,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,110,245,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.5s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
      margin: 0 auto 1rem;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .form-group { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124,110,245,0.1);
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: transform 0.1s, background 0.2s;
    }

    .btn-submit:hover { background: #8f82f7; }
    .btn-submit:active { transform: scale(0.98); }

    .footer-links {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .footer-links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="brand-header">
    <div class="brand-icon"></div>
    <h1 class="brand-name">Welcome Back</h1>
  </div>

  <form method="POST">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email"  name="email" placeholder="name@domain.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit"  class="btn-submit">Sign In</button>
  </form>

  <div class="footer-links">
    Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
  </div>
</div>

</body>
</html>
